<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
        body { max-width: 600px; margin: 20px auto; padding: 0 10px; }
        #msgBox { height: 400px; border: 1px solid #ccc; padding: 10px; overflow-y: auto; margin-bottom: 10px; }
        .msg { margin: 5px 0; padding: 8px; border-radius: 8px; max-width: 70%; }
        .my { background: #007bff; color: white; margin-left: auto; }
        .other { background: #eee; color: #333; margin-right: auto; }
        #inputArea { display: flex; gap: 5px; }
        #msgInput { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #sendBtn { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="msgBox"></div>
    <div id="inputArea">
        <input type="text" id="msgInput" placeholder="输入消息..." maxlength="100">
        <button id="sendBtn">发送</button>
    </div>

    <script>
        // 用免费公共WebSocket服务器，直接跨设备互通
        const ws = new WebSocket("wss://echo.websocket.org");
        const msgBox = document.getElementById("msgBox");
        const msgInput = document.getElementById("msgInput");
        const sendBtn = document.getElementById("sendBtn");

        // 接收消息
        ws.onmessage = (e) => {
            addMsg(e.data, false);
        };

        // 发送消息
        sendBtn.onclick = () => {
            const text = msgInput.value.trim();
            if (!text) return;
            ws.send(text);
            addMsg(text, true);
            msgInput.value = "";
        };

        // 渲染消息
        function addMsg(text, isMy) {
            const div = document.createElement("div");
            div.className = `msg ${isMy ? "my" : "other"}`;
            div.innerText = text;
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        }
    </script>
</body>
</html>
