<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私密聊天室（房间密码）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
        body { max-width: 600px; margin: 20px auto; padding: 0 10px; }
        #msgBox { height: 400px; border: 1px solid #ccc; padding: 10px; overflow-y: auto; margin-bottom: 10px; }
        .msg { margin: 5px 0; padding: 8px; border-radius: 8px; max-width: 70%; word-wrap: break-word; }
        .my { background: #007bff; color: white; margin-left: auto; }
        .other { background: #eee; color: #333; margin-right: auto; }
        .system { background: #f8f9fa; color: #666; text-align: center; margin: 5px auto; max-width: 90%; font-size: 14px; }
        .help { background: #e9f5ff; color: #0056b3; text-align: left; margin: 5px auto; max-width: 95%; font-size: 13px; white-space: pre-line; }
        #inputArea { display: flex; gap: 5px; }
        #msgInput { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #sendBtn { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #sendBtn:disabled { background: #6c757d; cursor: not-allowed; }
        .status-bar { font-size: 13px; color: #666; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="status-bar" id="statusBar">房间：公共 | 用户名：未设置 | 密码：公开</div>
    <div id="msgBox"></div>
    <div id="inputArea">
        <input type="text" id="msgInput" placeholder="输入消息或指令（/h查看帮助）" maxlength="100">
        <button id="sendBtn" disabled>发送</button>
    </div>

    <script>
        // 基础配置
        const PIE_API_KEY = "VCXCEuvhGc8bXH5u3WLxsq29iDCj3J6p8fRLfe1a";
        const BASE_URL = "wss://demo.piesocket.com/v3";
        let ws = null;
        let username = "";
        let roomName = "公共";
        let roomId = "public";
        let roomPwd = "公开"; // 房间密码：公开=免密
        // 房间存储（键=房间号，值={name:房间名,pwd:密码}）
        const roomList = { "public": { name: "公共", pwd: "公开" } };
        // 流程状态
        let isCreatingRoom = false, createStep = 0;
        let isJoiningRoom = false, joinStep = 0;
        let tempRoom = { name: "", id: "", pwd: "" };

        // DOM
        const msgBox = document.getElementById("msgBox");
        const msgInput = document.getElementById("msgInput");
        const sendBtn = document.getElementById("sendBtn");
        const statusBar = document.getElementById("statusBar");

        // 初始化用户名
        function initUsername() {
            username = prompt("请输入你的用户名：", "用户" + Math.floor(Math.random() * 1000));
            username = username?.trim() || "匿名用户";
            updateStatus();
        }

        // 更新状态栏
        function updateStatus() {
            statusBar.innerText = `房间：${roomName}(${roomId}) | 用户名：${username} | 密码：${roomPwd}`;
        }

        // 初始化WebSocket
        function initWebSocket() {
            if (ws) { ws.close(); ws = null; }
            const channel = `channel_${roomId}`;
            const wsUrl = `${BASE_URL}/${channel}?api_key=${PIE_API_KEY}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                sendBtn.disabled = false;
                addMsg(`✅ 已进入房间：${roomName}(${roomId})`, "system");
                // 心跳保活
                setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ event: "ping" }));
                }, 20000);
            };

            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.event === "message" && data.channel === channel) {
                        const msg = JSON.parse(data.value);
                        addMsg(`【${msg.user}】${msg.text}`, false);
                    }
                } catch (err) {}
            };

            ws.onclose = () => {
                sendBtn.disabled = true;
                addMsg("❌ 连接断开，3秒后重连...", "system");
                setTimeout(initWebSocket, 3000);
            };

            ws.onerror = () => addMsg("❌ 连接错误", "system");
        }

        // 发送消息
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;

            // 指令处理（自动吞指令）
            if (text.startsWith("/")) {
                handleCommand(text);
                msgInput.value = "";
                return;
            }

            // 房间创建/加入流程输入
            if (isCreatingRoom) { handleCreateRoomStep(text); msgInput.value = ""; return; }
            if (isJoiningRoom) { handleJoinRoomStep(text); msgInput.value = ""; return; }

            // 正常聊天发送
            if (ws?.readyState === WebSocket.OPEN) {
                const msg = JSON.stringify({ user: username, text: text });
                ws.send(JSON.stringify({ event: "message", channel: `channel_${roomId}`, value: msg }));
                addMsg(`【${username}】${text}`, true);
                msgInput.value = "";
            }
        }

        // 指令处理
        function handleCommand(cmd) {
            switch (cmd) {
                case "/c":
                    isCreatingRoom = true; createStep = 1;
                    addMsg("📝 创建房间：请输入【房间名】", "system");
                    break;
                case "/j":
                    isJoiningRoom = true; joinStep = 1;
                    addMsg("📝 加入房间：请输入【房间号】", "system");
                    break;
                case "/h":
                    addMsg(`📖 指令帮助：
/c → 创建房间（依次输入：房间名→房间号→密码，密码填「公开」免密）
/j → 加入房间（依次输入：房间号→房间名→密码，公开房间免密）
/h → 查看所有指令`, "help");
                    break;
            }
        }

        // 创建房间分步处理
        function handleCreateRoomStep(input) {
            if (createStep === 1) { tempRoom.name = input; createStep = 2; addMsg("📝 请输入【房间号】", "system"); }
            else if (createStep === 2) { tempRoom.id = input; createStep = 3; addMsg("📝 请输入【房间密码】（填「公开」免密）", "system"); }
            else if (createStep === 3) {
                tempRoom.pwd = input;
                roomList[tempRoom.id] = { name: tempRoom.name, pwd: tempRoom.pwd };
                // 切换进入新房间
                roomName = tempRoom.name; roomId = tempRoom.id; roomPwd = tempRoom.pwd;
                isCreatingRoom = false; createStep = 0; tempRoom = {};
                initWebSocket(); updateStatus();
                addMsg(`✅ 房间创建成功！房间号：${roomId}，密码：${roomPwd}`, "system");
            }
        }

        // 加入房间分步处理（密码检测）
        function handleJoinRoomStep(input) {
            if (joinStep === 1) { tempRoom.id = input; joinStep = 2; addMsg("📝 请输入【房间名】", "system"); }
            else if (joinStep === 2) {
                tempRoom.name = input;
                // 检测房间是否存在
                if (!roomList[tempRoom.id]) {
                    addMsg("❌ 房间不存在！", "system");
                    isJoiningRoom = false; joinStep = 0; tempRoom = {};
                    return;
                }
                // 检测密码：公开免密，非公开需输入密码
                if (roomList[tempRoom.id].pwd === "公开") {
                    roomName = tempRoom.name; roomId = tempRoom.id; roomPwd = "公开";
                    isJoiningRoom = false; joinStep = 0; tempRoom = {};
                    initWebSocket(); updateStatus();
                    return;
                }
                joinStep = 3; addMsg("📝 房间已加密，请输入【房间密码】", "system");
            }
            else if (joinStep === 3) {
                // 密码校验
                if (input !== roomList[tempRoom.id].pwd) {
                    addMsg("❌ 密码错误！", "system");
                    isJoiningRoom = false; joinStep = 0; tempRoom = {};
                    return;
                }
                roomName = tempRoom.name; roomId = tempRoom.id; roomPwd = input;
                isJoiningRoom = false; joinStep = 0; tempRoom = {};
                initWebSocket(); updateStatus();
            }
        }

        // 渲染消息
        function addMsg(text, type) {
            const div = document.createElement("div");
            if (type === "system") div.className = "msg system";
            else if (type === "help") div.className = "msg help";
            else div.className = `msg ${type ? "my" : "other"}`;
            div.innerText = text;
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        // 绑定事件
        sendBtn.onclick = sendMessage;
        msgInput.onkeydown = e => e.key === "Enter" && sendMessage();

        // 启动
        initUsername();
        initWebSocket();
    </script>
</body>
</html>
